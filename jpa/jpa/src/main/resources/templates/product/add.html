<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
    layout:decorate="~{_layout}">

<head>
    <meta charset="UTF-8">
    <title>Add Product</title>
</head>

<body>
    <div layout:fragment="content" class="container body-content">
        <h2>Add Product</h2>
        <form th:action="@{/products/save}" th:object="${product}" method="post" class="form"
            enctype="multipart/form-data">
            <div class="form-group">
                <label for="name">Name:</label>
                <input class="form-control" type="text" th:field="*{name}" id="name" placeholder="Product Name">
            </div>
            <div class="form-group">
                <label for="imageFile">Image File:</label>
                <input class="form-control" type="file" name="imageFile" id="imageFile" accept="image/*"
                    onchange="previewImage(event)">
                <div class="mt-2">
                    <img id="imagePreview" src="#" alt="Image Preview"
                        style="display: none; max-width: 200px; max-height: 200px;">
                </div>
            </div>
            <div class="form-group">
                <label for="price">Price:</label>
                <input class="form-control" type="number" th:field="*{price}" id="price" placeholder="Price">
            </div>
            <div class="form-group">
                <label for="category">Category:</label>
                <select th:field="*{category}" class="form-control" id="category">
                    <option th:each="category : ${categories}" th:value="${category.id}" th:text="${category.name}">
                    </option>
                </select>
            </div>
            <button type="submit" class="btn btn-success">Add Product</button>
            <a th:href="@{/products}" class="btn btn-secondary">Back to Home</a>
        </form>

        <script>
            function previewImage(event) {
                if (event.target.files.length > 0) {
                    var reader = new FileReader();
                    reader.onload = function () {
                        var output = document.getElementById('imagePreview');
                        output.src = reader.result;
                        output.style.display = 'block';
                    };
                    reader.readAsDataURL(event.target.files[0]);
                }
            }

            document.querySelector('.form').addEventListener('submit', function (e) {
                e.preventDefault(); // Prevent page reload
                const formData = new FormData(this);
                const submitBtn = this.querySelector('button[type="submit"]');
                const originalText = submitBtn.innerText;
                submitBtn.innerText = 'Adding...';
                submitBtn.disabled = true;

                fetch(this.action, {
                    method: 'POST',
                    body: formData
                }).then(response => {
                    if (response.ok) {
                        window.location.href = '/products';
                    } else {
                        alert('Có lỗi xảy ra khi thêm sản phẩm!');
                    }
                }).catch(error => {
                    console.error('Error:', error);
                    alert('Có lỗi xảy ra khi thêm sản phẩm!');
                }).finally(() => {
                    submitBtn.innerText = originalText;
                    submitBtn.disabled = false;
                });
            });
        </script>
    </div>
</body>

</html>
