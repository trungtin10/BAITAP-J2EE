<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title>Thêm Sản phẩm mới</title>
</head>
<body>
    <div layout:fragment="content">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card shadow-lg border-0">
                    <div class="card-header bg-success text-white text-center">
                        <h2 class="mb-0"><i class="fa-solid fa-plus-circle me-2"></i>Thêm Sản phẩm mới</h2>
                    </div>
                    <div class="card-body p-4">
                        <form th:action="@{/products/create}" th:object="${product}" method="post" enctype="multipart/form-data">
                            <!-- Product Name -->
                            <div class="mb-3">
                                <label for="name" class="form-label fw-bold">Tên sản phẩm</label>
                                <input type="text" id="name" th:field="*{name}" class="form-control" placeholder="Nhập tên sản phẩm...">
                                <div class="text-danger mt-1" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
                            </div>

                            <!-- Product Price -->
                            <div class="mb-3">
                                <label for="price" class="form-label fw-bold">Giá</label>
                                <div class="input-group">
                                    <input type="number" id="price" th:field="*{price}" class="form-control" placeholder="Nhập giá...">
                                    <span class="input-group-text">VNĐ</span>
                                </div>
                                <div class="text-danger mt-1" th:if="${#fields.hasErrors('price')}" th:errors="*{price}"></div>
                            </div>

                            <!-- Category -->
                            <div class="mb-3">
                                <label for="category" class="form-label fw-bold">Danh mục</label>
                                <select id="category" th:field="*{category}" class="form-select">
                                    <option value="">-- Chọn danh mục --</option>
                                    <option th:each="category : ${categories}" th:value="${category.id}" th:text="${category.name}"></option>
                                </select>
                                <div class="text-danger mt-1" th:if="${#fields.hasErrors('category')}" th:errors="*{category}"></div>
                            </div>

                            <!-- Image Upload -->
                            <div class="mb-4">
                                <label for="imageFile" class="form-label fw-bold">Hình ảnh</label>
                                <input type="file" id="imageFile" name="imageFile" class="form-control">
                            </div>

                            <!-- Actions -->
                            <div class="d-grid gap-2 d-md-flex justify-content-md-end">
                                <a th:href="@{/products}" class="btn btn-secondary me-md-2">
                                    <i class="fa-solid fa-arrow-left me-1"></i> Quay lại
                                </a>
                                <button type="submit" class="btn btn-success">
                                    <i class="fa-solid fa-save me-1"></i> Lưu sản phẩm
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
