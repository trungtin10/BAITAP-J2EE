<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title>Chỉnh sửa Sản phẩm</title>
</head>
<body>
    <div layout:fragment="content">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card shadow-lg border-0">
                    <div class="card-header bg-warning text-dark text-center">
                        <h2 class="mb-0"><i class="fa-solid fa-pen-to-square me-2"></i>Chỉnh sửa Sản phẩm</h2>
                    </div>
                    <div class="card-body p-4">
                        <form th:action="@{/products/edit/{id}(id=${product.id})}" th:object="${product}" method="post" enctype="multipart/form-data">
                            <!-- Product Name -->
                            <div class="mb-3">
                                <label for="name" class="form-label fw-bold">Tên sản phẩm</label>
                                <input type="text" id="name" th:field="*{name}" class="form-control" placeholder="Nhập tên sản phẩm...">
                                <div class="text-danger mt-1" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
                            </div>

                            <!-- Product Price -->
                            <div class="mb-3">
                                <label for="price" class="form-label fw-bold">Giá</label>
                                <div class="input-group">
                                    <input type="number" id="price" th:field="*{price}" class="form-control" placeholder="Nhập giá...">
                                    <span class="input-group-text">VNĐ</span>
                                </div>
                                <div class="text-danger mt-1" th:if="${#fields.hasErrors('price')}" th:errors="*{price}"></div>
                            </div>

                            <!-- Category -->
                            <div class="mb-3">
                                <label for="category" class="form-label fw-bold">Danh mục</label>
                                <select id="category" th:field="*{category}" class="form-select">
                                    <option value="">-- Chọn danh mục --</option>
                                    <!-- Kiểm tra null an toàn cho product.category -->
                                    <option th:each="category : ${categories}"
                                            th:value="${category.id}"
                                            th:text="${category.name}"
                                            th:selected="${product.category != null && category.id == product.category.id}">
                                    </option>
                                </select>
                                <div class="text-danger mt-1" th:if="${#fields.hasErrors('category')}" th:errors="*{category}"></div>
                            </div>

                            <!-- Image Upload -->
                            <div class="mb-4">
                                <label for="imageFile" class="form-label fw-bold">Hình ảnh</label>
                                <input type="file" id="imageFile" name="imageFile" class="form-control">
                                <div class="mt-2" th:if="${product.image != null}">
                                    <img th:src="@{'/images/' + ${product.image}}" alt="Current Image" class="img-thumbnail" style="max-width: 150px;">
                                    <p class="text-muted small">Ảnh hiện tại</p>
                                </div>
                            </div>

                            <!-- Actions -->
                            <div class="d-grid gap-2 d-md-flex justify-content-md-end">
                                <a th:href="@{/products}" class="btn btn-secondary me-md-2">
                                    <i class="fa-solid fa-arrow-left me-1"></i> Quay lại
                                </a>
                                <button type="submit" class="btn btn-warning">
                                    <i class="fa-solid fa-save me-1"></i> Cập nhật
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
